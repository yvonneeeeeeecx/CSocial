server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_society?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  level:
    com.social.csocial: DEBUG
    org.hibernate.SQL: DEBUG



springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
